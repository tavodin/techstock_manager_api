spring:
  application:
    name: techstock-manager

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    hibernate:
      ddl-auto: none

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        engine:
          jdbc:
            spi:
              SqlExceptionHelper: TRACE
        orm:
          jdbc:
            bind: TRACE
