server:
  port: 8888

testcontainers:
  reuse:
    enable: true

spring:
  application:
    name: techstock-manager

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

jwt:
  secret: z7K9pWm1Vd2s9xQeY3R5bG1hY2hhZGVjb21zZWNyZXRrZXk=
  expiration: 3600000